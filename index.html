<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:Georgia,serif;background:linear-gradient(160deg,#1a3a2a 0%,#0d2418 55%,#0a1e14 100%);color:#f5f0e0;min-height:100vh;overflow-x:hidden}

::-webkit-scrollbar-thumb{background:rgba(245,200,66,.4);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes flashIn{0%{opacity:0;transform:scale(.93)}60%{transform:scale(1.02)}100%{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fadein{animation:fadeIn .35s ease forwards}
.flashin{animation:flashIn .3s ease forwards}
.spinner{width:22px;height:22px;border:2px solid rgba(255,255,255,.2);border-top-color:#f5c842;border-radius:50%;animation:spin 1s linear infinite;display:inline-block;vertical-align:middle}
.dot{width:8px;height:8px;border-radius:50%;background:#50c864;display:inline-block;animation:pulse 1.4s ease-in-out infinite}
input,select,button{font-family:Georgia,serif}
input[type=text],select{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#f5f0e0;padding:10px 14px;font-size:15px;width:100%;outline:none;transition:border-color .2s}
input[type=text]:focus,select:focus{border-color:#f5c842}
select option{background:#0d2418}
button{cursor:pointer;border:none;border-radius:8px;font-size:15px;padding:10px 20px;transition:all .15s;font-family:Georgia,serif}

.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.3);color:#f5f0e0}
.btn-outline:hover:not(:disabled){border-color:#f5c842;color:#f5c842}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:20px}
.card-gold{border-color:rgba(245,200,66,.4);background:rgba(245,200,66,.04)}
.badge-hit{background:rgba(80,200,100,.18);border:1px solid rgba(80,200,100,.4);color:#7fffa0;border-radius:6px;padding:2px 9px;font-size:13px}
.badge-miss{background:rgba(200,80,80,.18);border:1px solid rgba(200,80,80,.4);color:#ff9999;border-radius:6px;padding:2px 9px;font-size:13px}
.muted{color:rgba(245,240,224,.5);font-size:13px}
.gold{color:#f5c842}
.room-code{font-family:'Courier New',monospace;color:#f5c842;font-size:44px;font-weight:bold;letter-spacing:12px;text-shadow:0 0 24px rgba(245,200,66,.35)}
.progress-track{background:rgba(255,255,255,.1);border-radius:4px;height:6px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,#f5c842,#e6a820);border-radius:4px;transition:width .3s}
label{display:block;font-size:12px;color:rgba(245,240,224,.55);margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase}

.ac-item{padding:9px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid rgba(255,255,255,.06)}

.tab-btn:not(.active){background:transparent;color:rgba(245,240,224,.5)}
.center-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}

<body>
<div id="app"></div>
<script>
'use strict';

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
var STATS = [
{group:‘Batting’, label:‘Home Runs’,    api:‘homeRuns’,           sg:‘hitting’,  fmt:function(v){return Math.round(v);}},
{group:‘Batting’, label:‘RBI’,          api:‘rbi’,                sg:‘hitting’,  fmt:function(v){return Math.round(v);}},
{group:‘Batting’, label:‘Hits’,         api:‘hits’,               sg:‘hitting’,  fmt:function(v){return Math.round(v);}},
{group:‘Batting’, label:‘Batting Avg’,  api:‘battingAverage’,     sg:‘hitting’,  fmt:function(v){return parseFloat(v).toFixed(3);}},
{group:‘Batting’, label:‘OPS’,          api:‘onBasePlusSlugging’, sg:‘hitting’,  fmt:function(v){return parseFloat(v).toFixed(3);}},
{group:‘Batting’, label:‘Stolen Bases’, api:‘stolenBases’,        sg:‘hitting’,  fmt:function(v){return Math.round(v);}},
{group:‘Pitching’,label:‘Wins’,         api:‘wins’,               sg:‘pitching’, fmt:function(v){return Math.round(v);}},
{group:‘Pitching’,label:‘ERA’,          api:‘earnedRunAverage’,   sg:‘pitching’, fmt:function(v){return parseFloat(v).toFixed(2);}},
{group:‘Pitching’,label:‘Strikeouts’,   api:‘strikeouts’,         sg:‘pitching’, fmt:function(v){return Math.round(v);}},
{group:‘Pitching’,label:‘Saves’,        api:‘saves’,              sg:‘pitching’, fmt:function(v){return Math.round(v);}},
];
var PERIODS = [
{label:‘Last 5 Years’, value:‘last5’,    start: new Date().getFullYear()-5},
{label:‘Since 2000’,   value:‘since2000’,start:2000},
{label:‘Since 1990’,   value:‘since1990’,start:1990},
{label:‘All Time’,     value:‘alltime’,  start:1969},
];
var RATE_STATS = {battingAverage:1,onBasePlusSlugging:1,earnedRunAverage:1};
var CUR_YEAR = new Date().getFullYear() - 1;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function rand4(){
var c=‘ABCDEFGHJKLMNPQRSTUVWXYZ23456789’,o=’’;
for(var i=0;i<4;i++) o+=c[Math.floor(Math.random()*c.length)];
return o;
}
function normName(s){
return (s||’’).toLowerCase().trim().normalize(‘NFD’)
.replace(/[\u0300-\u036f]/g,’’).replace(/[^a-z0-9 ]/g,’’);
}
function getStat(api){for(var i=0;i<STATS.length;i++){if(STATS[i].api===api)return STATS[i];}return null;}
function getPeriod(v){for(var i=0;i<PERIODS.length;i++){if(PERIODS[i].value===v)return PERIODS[i];}return null;}
function buildSnake(n,gpr){
var o=[];
for(var g=0;g<gpr;g++){
if(g%2===0){for(var p=0;p<n;p++)o.push(p);}
else{for(var p=n-1;p>=0;p–)o.push(p);}
}
return o;
}
function lookupInLB(name,lb){
var n=normName(name);
for(var i=0;i<lb.length;i++){if(normName(lb[i].name)===n)return lb[i];}
for(var i=0;i<lb.length;i++){if(normName(lb[i].name).indexOf(n)!==-1)return lb[i];}
return null;
}

// ── STORAGE ───────────────────────────────────────────────────────────────────
var SK=‘the100game_v2’;
function loadAll(){try{return JSON.parse(localStorage.getItem(SK)||’{}’)}catch(e){return{};}}
function saveAll(o){try{localStorage.setItem(SK,JSON.stringify(o));}catch(e){}}
function getRoom(code){return loadAll()[code]||null;}
function setRoom(code,data){var a=loadAll();a[code]=Object.assign({},data,{ts:Date.now()});saveAll(a);}
function patchSetting(code,key,val){
var a=loadAll();if(!a[code])return;
a[code].settings=a[code].settings||{};
a[code].settings[key]=val;a[code].ts=Date.now();saveAll(a);
}

// ── API ───────────────────────────────────────────────────────────────────────
function fetchOneSeason(api,sg,year){
var url=‘https://statsapi.mlb.com/api/v1/stats/leaders?leaderCategories=’+api
+’&season=’+year+’&leaderGameTypes=R&limit=500&statGroup=’+sg;
return fetch(url)
.then(function(r){if(!r.ok)throw new Error(‘HTTP ‘+r.status);return r.json();})
.then(function(d){
var rows=(d.leagueLeaders&&d.leagueLeaders[0]&&d.leagueLeaders[0].leaders)||[];
return rows.map(function(l){
return{name:(l.person&&l.person.fullName)||’’,id:l.person&&l.person.id,val:parseFloat(l.value||0)};
});
});
}

function buildLB(api,sg,startYear,onPct){
var seasons=[],map={};
for(var y=startYear;y<=CUR_YEAR;y++)seasons.push(y);
var isRate=!!RATE_STATS[api];
function step(i){
if(i>=seasons.length){
var players=Object.keys(map).map(function(k){return map[k];});
if(isRate){
players=players.map(function(p){
var avg=p.vals.length?p.vals.reduce(function(a,b){return a+b;},0)/p.vals.length:0;
return {name:p.name,total:avg,sc:p.sc};
});
}
var asc=api===‘earnedRunAverage’||api===‘battingAverage’;
var out=players.filter(function(p){return p.total>0;});
if(api===‘earnedRunAverage’)out=out.filter(function(p){return p.sc>=2;});
out.sort(function(a,b){return asc?a.total-b.total:b.total-a.total;});
return Promise.resolve(out.slice(0,150).map(function(p,i){return{rank:i+1,name:p.name,value:p.total};}));
}
if(onPct)onPct(Math.round(i/seasons.length*100));
return fetchOneSeason(api,sg,seasons[i]).then(function(rows){
rows.forEach(function(r){
if(!r.id||!r.name)return;
if(!map[r.id])map[r.id]={name:r.name,total:0,sc:0,vals:[]};
if(isRate)map[r.id].vals.push(r.val);
else map[r.id].total+=r.val;
map[r.id].sc++;
});
}).catch(function(){}).then(function(){return step(i+1);});
}
return step(0);
}

// ── DOM HELPERS ───────────────────────────────────────────────────────────────
// h(tag, {attrs}, …children)
function h(tag,attrs){
var el=document.createElement(tag);
if(attrs){
Object.keys(attrs).forEach(function(k){
if(k===‘cls’){el.className=attrs[k];}
else if(k===‘css’){Object.assign(el.style,attrs[k]);}
else if(k[0]===’_’){el.addEventListener(k.slice(1),attrs[k]);}
else{el[k]=attrs[k];}
});
}
for(var i=2;i<arguments.length;i++){
var c=arguments[i];
if(c==null||c===false)continue;
if(typeof c===‘string’||typeof c===‘number’)el.appendChild(document.createTextNode(’’+c));
else el.appendChild(c);
}
return el;
}
function div(attrs){var a=[].slice.call(arguments);a.unshift(‘div’);return h.apply(null,a);}
function span(attrs){var a=[].slice.call(arguments);a.unshift(‘span’);return h.apply(null,a);}
function btn(cls,txt,handler,extra){
var attrs={cls:cls};
if(extra)Object.assign(attrs,extra);
attrs._click=handler;
return h(‘button’,attrs,txt);
}
function badge(rank){
if(rank>=1&&rank<=100)return span({cls:‘badge-hit’},’#’+rank);
return span({cls:‘badge-miss’},rank>100?’#’+rank:‘Not Found’);
}
function card(extra){return div({cls:‘card’,css:extra||{}});}

// ── APP STATE ─────────────────────────────────────────────────────────────────
var S={
screen:‘home’,
myName:’’,roomCode:’’,isHost:false,
leaderboard:null,
round:1,orderIdx:0,scores:{},allGuesses:[],snakeOrder:[],
flashResult:null,flashTimer:null,
loadPct:0,loadMsg:’’,loadError:null,
input:’’,suggestions:[],acIdx:-1,
pollTimer:null,
errorMsg:null,
};

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
var app=document.getElementById(‘app’);
while(app.firstChild)app.removeChild(app.firstChild);

if(S.errorMsg){
app.appendChild(
div({cls:’’,css:{position:‘fixed’,top:0,left:0,right:0,background:‘rgba(200,80,80,0.95)’,color:’#fff’,padding:‘12px 20px’,zIndex:‘999’,display:‘flex’,justifyContent:‘space-between’,alignItems:‘center’,fontSize:‘14px’}},
span(null,‘⚠️ ‘+S.errorMsg),
btn(’’,  ‘✕’,function(){S.errorMsg=null;render();},{css:{background:‘transparent’,color:’#fff’,border:‘none’,fontSize:‘20px’}})
)
);
}

var screens={home:screenHome,lobby:screenLobby,loading:screenLoading,game:screenGame,end:screenEnd};
if(screens[S.screen])app.appendChild(screens[S.screen]());

app.appendChild(div({css:{position:‘fixed’,bottom:‘12px’,right:‘16px’,fontSize:‘11px’,color:‘rgba(245,240,224,0.18)’,pointerEvents:‘none’}},‘The 100 Game ⚾’));
}

function screenHome(){
var activeTab=‘create’;
var wrap=div({cls:‘center-wrap’});

inner.appendChild(div({cls:‘fadein’,css:{textAlign:‘center’,marginBottom:‘36px’}},

var codeIn=h(‘input’,{type:‘text’,placeholder:‘e.g. AB3D’,maxLength:4,css:{letterSpacing:‘8px’,fontFamily:‘monospace’,fontSize:‘22px’,fontWeight:‘bold’,textAlign:‘center’,textTransform:‘uppercase’}});

joinBlock.appendChild(codeIn);

var goBtn=btn(‘btn-gold’,‘🏟 Create Room’,function(){
var name=(nameIn.value||’’).trim();
if(!name){nameIn.focus();return;}
if(activeTab===‘create’){doCreate(name);}
else{
var code=codeIn.value.trim().toUpperCase();
if(code.length<4){codeIn.focus();return;}
doJoin(name,code);
}
},{css:{width:‘100%’,padding:‘13px’,fontSize:‘17px’}});
c.appendChild(goBtn);
inner.appendChild(c);

var howCard=card({marginTop:‘18px’,animationDelay:‘0.16s’});howCard.classList.add(‘fadein’);
howCard.appendChild(h(‘h3’,{css:{color:’#f5c842’,marginBottom:‘10px’,fontSize:‘15px’}},‘📋 How to Play’));
var p=h(‘p’,{css:{color:‘rgba(245,240,224,0.7)’,lineHeight:‘1.75’,fontSize:‘14px’}});
p.innerHTML=‘The host picks a stat + time period. Players take turns guessing players from that leaderboard. Score = rank (1–100). <strong style="color:#f5c842">#100 = 100 pts</strong>, ranked 101+ = 0 pts. Most points wins!’;
howCard.appendChild(p);inner.appendChild(howCard);

wrap.appendChild(inner);
return wrap;
}

function doCreate(name){
var code=rand4();
setRoom(code,{code:code,host:name,players:[{name:name}],settings:{statKey:‘homeRuns’,timePeriod:‘last5’,rounds:3,gpr:2},state:‘lobby’});
S.myName=name;S.roomCode=code;S.isHost=true;S.screen=‘lobby’;
startPoll();render();
}
function doJoin(name,code){
var room=getRoom(code);
if(!room){S.errorMsg=‘Room “’+code+’” not found.’;render();return;}
if(room.state!==‘lobby’){S.errorMsg=‘That game is already in progress.’;render();return;}
var players=room.players||[];
if(!players.find(function(p){return p.name===name;})){
setRoom(code,Object.assign({},room,{players:players.concat([{name:name}])}));
}
S.myName=name;S.roomCode=code;S.isHost=false;S.screen=‘lobby’;
startPoll();render();
}

// ── POLL ──────────────────────────────────────────────────────────────────────
function startPoll(){
stopPoll();
S.pollTimer=setInterval(function(){
var room=getRoom(S.roomCode);
if(!room)return;
if(!S.isHost&&room.state===‘game’&&room.leaderboard){
stopPoll();S.leaderboard=room.leaderboard;startGame(room);return;
}
if(S.screen===‘lobby’)render();
},1200);
}
function stopPoll(){if(S.pollTimer){clearInterval(S.pollTimer);S.pollTimer=null;}}

// ── LOADING ───────────────────────────────────────────────────────────────────
function launchGame(){
var room=getRoom(S.roomCode);
var st=(room&&room.settings)||{};
var stat=getStat(st.statKey||‘homeRuns’);
var period=getPeriod(st.timePeriod||‘last5’);
if(!stat||!period){S.errorMsg=‘Invalid settings.’;render();return;}
S.screen=‘loading’;S.loadPct=0;S.loadMsg=‘Fetching leaderboard…’;S.loadError=null;render();
buildLB(stat.api,stat.sg,period.start,function(pct){
S.loadPct=pct;S.loadMsg=‘Loading seasons… ‘+pct+’%’;
var f=document.getElementById(‘lpfill’);if(f)f.style.width=pct+’%’;
var m=document.getElementById(‘lpmsg’);if(m)m.textContent=S.loadMsg;
}).then(function(lb){
S.leaderboard=lb;
var room=getRoom(S.roomCode);
setRoom(S.roomCode,Object.assign({},room,{state:‘game’,leaderboard:lb}));
startGame(room);
}).catch(function(err){
S.loadError=’Could not load data: ’+err.message;S.screen=‘loading’;render();
});
}

function doGuess(nameInput){
var trimmed=(nameInput||’’).trim();
if(!trimmed)return;
var room=getRoom(S.roomCode)||{players:[],settings:{}};
var players=room.players||[];
var st=room.settings||{};
var rounds=st.rounds||3;
var totalTurns=S.snakeOrder.length;

var found=lookupInLB(trimmed,S.leaderboard||[]);
var rank=found?found.rank:999;
var pts=(rank>=1&&rank<=100)?rank:0;
var result={playerName:found?found.name:trimmed,guesserName:S.myName,rank:rank,value:found?found.value:0,pts:pts,round:S.round,found:!!found};

S.scores[S.myName]=(S.scores[S.myName]||0)+pts;
S.allGuesses=S.allGuesses.concat([result]);
S.input=’’;S.suggestions=[];S.acIdx=-1;

if(S.flashTimer)clearTimeout(S.flashTimer);
S.flashResult=result;
S.flashTimer=setTimeout(function(){S.flashResult=null;render();},3000);

var next=S.orderIdx+1;
if(next>=totalTurns){
if(S.round>=rounds){setTimeout(function(){S.screen=‘end’;render();},350);}
else{S.round++;S.orderIdx=0;}
} else {S.orderIdx=next;}
render();
}
