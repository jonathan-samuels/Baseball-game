<!DOCTYPE html>

<html lang="en">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:Georgia,serif;background:linear-gradient(160deg,#1a3a2a 0%,#0d2418 55%,#0a1e14 100%);background-attachment:fixed;color:#f5f0e0;min-height:100vh;overflow-x:hidden}
#root{min-height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:rgba(0,0,0,.2)}
::-webkit-scrollbar-thumb{background:rgba(245,200,66,.4);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes flashIn{0%{opacity:0;transform:scale(.92) translateY(-10px)}60%{transform:scale(1.03) translateY(0)}100%{opacity:1;transform:scale(1)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .4s ease forwards}
.flash-card{animation:flashIn .35s cubic-bezier(.22,1,.36,1) forwards}
.slide-down{animation:slideDown .2s ease forwards}
.pulse-anim{animation:pulse 1.5s ease-in-out infinite}
.spin{animation:spin 1s linear infinite}
input,select,button{font-family:Georgia,serif;outline:none}
input[type=text],input[type=number],select{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);border-radius:8px;color:#f5f0e0;padding:10px 14px;font-size:15px;width:100%;transition:border-color .2s}
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:#f5c842}
select option{background:#0d2418;color:#f5f0e0}
button{cursor:pointer;border:none;border-radius:8px;font-size:15px;padding:10px 20px;transition:all .18s}
button:active{transform:scale(.97)}
button:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-gold{background:linear-gradient(135deg,#f5c842 0%,#e6a820 100%);color:#0d2418;font-weight:bold;letter-spacing:.02em}
.btn-gold:hover:not(:disabled){filter:brightness(1.1);box-shadow:0 4px 16px rgba(245,200,66,.35)}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.3);color:#f5f0e0}
.btn-outline:hover:not(:disabled){border-color:#f5c842;color:#f5c842}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:20px}
.badge-hit{background:rgba(80,200,100,.18);border:1px solid rgba(80,200,100,.4);color:#7fffa0;border-radius:6px;padding:2px 8px;font-size:13px;display:inline-block}
.badge-miss{background:rgba(200,80,80,.18);border:1px solid rgba(200,80,80,.4);color:#ff9999;border-radius:6px;padding:2px 8px;font-size:13px;display:inline-block}
.room-code{font-family:'Courier New',monospace;color:#f5c842;font-size:42px;font-weight:bold;letter-spacing:10px;text-shadow:0 0 30px rgba(245,200,66,.4)}
.autocomplete-list{position:absolute;z-index:100;width:100%;background:#122a1c;border:1px solid rgba(245,200,66,.4);border-radius:8px;max-height:220px;overflow-y:auto;top:calc(100% + 4px);left:0}
.autocomplete-item{padding:9px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid rgba(255,255,255,.06);transition:background .12s}
.autocomplete-item:hover,.autocomplete-item.selected{background:rgba(245,200,66,.15);color:#f5c842}
.autocomplete-item:last-child{border-bottom:none}
.progress-track{background:rgba(255,255,255,.1);border-radius:4px;height:6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#f5c842,#e6a820);border-radius:4px;transition:width .3s}
label{display:block;font-size:13px;color:rgba(245,240,224,.6);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.gold{color:#f5c842}
.muted{color:rgba(245,240,224,.5)}
.small{font-size:13px}

<body>
<div id="root"></div>
<script>
'use strict';
var e = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;
var useMemo = React.useMemo;

// ── CONSTANTS ────────────────────────────────────────────────────────────────

var STAT_CATEGORIES = [
{ group: ‘Batting’, stats: [
{ label: ‘Home Runs’,    api: ‘homeRuns’,           statGroup: ‘hitting’,  fmt: function(v){ return v; } },
{ label: ‘RBI’,          api: ‘rbi’,                statGroup: ‘hitting’,  fmt: function(v){ return v; } },
{ label: ‘Hits’,         api: ‘hits’,               statGroup: ‘hitting’,  fmt: function(v){ return v; } },
{ label: ‘Batting Avg’,  api: ‘battingAverage’,     statGroup: ‘hitting’,  fmt: function(v){ return parseFloat(v).toFixed(3); } },
{ label: ‘OPS’,          api: ‘onBasePlusSlugging’, statGroup: ‘hitting’,  fmt: function(v){ return parseFloat(v).toFixed(3); } },
{ label: ‘Stolen Bases’, api: ‘stolenBases’,        statGroup: ‘hitting’,  fmt: function(v){ return v; } },
]},
{ group: ‘Pitching’, stats: [
{ label: ‘Wins’,         api: ‘wins’,               statGroup: ‘pitching’, fmt: function(v){ return v; } },
{ label: ‘ERA’,          api: ‘earnedRunAverage’,   statGroup: ‘pitching’, fmt: function(v){ return parseFloat(v).toFixed(2); } },
{ label: ‘Strikeouts’,   api: ‘strikeouts’,         statGroup: ‘pitching’, fmt: function(v){ return v; } },
{ label: ‘Saves’,        api: ‘saves’,              statGroup: ‘pitching’, fmt: function(v){ return v; } },
]},
];

var ALL_STATS = [];
STAT_CATEGORIES.forEach(function(g) {
g.stats.forEach(function(s) { ALL_STATS.push(Object.assign({}, s, { group: g.group })); });
});

var TIME_PERIODS = [
{ label: ‘Last 5 Years’,  value: ‘last5’,    startYear: new Date().getFullYear() - 5 },
{ label: ‘Since 2000’,    value: ‘since2000’, startYear: 2000 },
{ label: ‘Since 1990’,    value: ‘since1990’, startYear: 1990 },
{ label: ‘All Time’,      value: ‘alltime’,   startYear: 1969 },
];

var currentYear = new Date().getFullYear() - 1;
var RATE_STATS = { battingAverage: true, onBasePlusSlugging: true, earnedRunAverage: true };

// ── UTILS ─────────────────────────────────────────────────────────────────────

function rand4() {
var chars = ‘ABCDEFGHJKLMNPQRSTUVWXYZ23456789’;
var out = ‘’;
for (var i = 0; i < 4; i++) out += chars[Math.floor(Math.random() * chars.length)];
return out;
}

function normalizeName(name) {
return name.toLowerCase().trim()
.normalize(‘NFD’).replace(/[\u0300-\u036f]/g, ‘’)
.replace(/[^a-z0-9 ]/g, ‘’);
}

function findStat(apiKey) {
for (var i = 0; i < ALL_STATS.length; i++) { if (ALL_STATS[i].api === apiKey) return ALL_STATS[i]; }
return null;
}

function findPeriod(val) {
for (var i = 0; i < TIME_PERIODS.length; i++) { if (TIME_PERIODS[i].value === val) return TIME_PERIODS[i]; }
return null;
}

// ── STORAGE ───────────────────────────────────────────────────────────────────

var STORAGE_KEY = ‘the100game_rooms’;
function getRooms() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || ‘{}’); } catch(err) { return {}; } }
function saveRooms(r) { localStorage.setItem(STORAGE_KEY, JSON.stringify(r)); }
function getRoom(code) { return getRooms()[code] || null; }
function setRoom(code, data) {
var rooms = getRooms();
rooms[code] = Object.assign({}, data, { updatedAt: Date.now() });
saveRooms(rooms);
}
function updateRoomSetting(code, key, val) {
var rooms = getRooms();
if (!rooms[code]) return;
if (!rooms[code].settings) rooms[code].settings = {};
rooms[code].settings[key] = val;
rooms[code].updatedAt = Date.now();
saveRooms(rooms);
}

// ── API ───────────────────────────────────────────────────────────────────────

function fetchSingleSeason(leaderCategory, statGroup, season) {
var url = ‘https://statsapi.mlb.com/api/v1/stats/leaders?leaderCategories=’ + leaderCategory +
‘&season=’ + season + ‘&leaderGameTypes=R&limit=500&statGroup=’ + statGroup;
return fetch(url).then(function(res) {
if (!res.ok) throw new Error(’HTTP ’ + res.status);
return res.json();
}).then(function(data) {
var leaders = (data.leagueLeaders && data.leagueLeaders[0] && data.leagueLeaders[0].leaders) || [];
return leaders.map(function(l) {
return {
name: (l.person && l.person.fullName) || ‘’,
playerId: l.person && l.person.id,
value: parseFloat(l.value || 0)
};
});
});
}

function aggregateSeasons(leaderCategory, statGroup, startYear, onProgress) {
var seasons = [];
for (var y = startYear; y <= currentYear; y++) seasons.push(y);
var isRate = !!RATE_STATS[leaderCategory];
var playerMap = {};

function processNext(i) {
if (i >= seasons.length) {
var players = Object.keys(playerMap).map(function(k) { return playerMap[k]; });
if (isRate) {
players = players.map(function(p) {
var avg = p.vals && p.vals.length ? p.vals.reduce(function(a, b) { return a + b; }, 0) / p.vals.length : 0;
return Object.assign({}, p, { total: avg });
});
}
var ascending = leaderCategory === ‘earnedRunAverage’ || leaderCategory === ‘battingAverage’;
var filtered = players.filter(function(p) { return p.total > 0; });
if (leaderCategory === ‘earnedRunAverage’) filtered = filtered.filter(function(p) { return p.seasonCount >= 2; });
filtered.sort(function(a, b) { return ascending ? a.total - b.total : b.total - a.total; });
return Promise.resolve(
filtered.slice(0, 150).map(function(p, idx) { return { rank: idx + 1, name: p.name, value: p.total }; })
);
}
if (onProgress) onProgress(Math.round((i / seasons.length) * 100));
return fetchSingleSeason(leaderCategory, statGroup, seasons[i]).then(function(rows) {
rows.forEach(function(row) {
if (!row.playerId || !row.name) return;
if (!playerMap[row.playerId]) playerMap[row.playerId] = { name: row.name, total: 0, seasonCount: 0, vals: [] };
if (isRate) { playerMap[row.playerId].vals.push(row.value); }
else { playerMap[row.playerId].total += row.value; }
playerMap[row.playerId].seasonCount++;
});
}).catch(function(err) {
console.warn(‘Season ’ + seasons[i] + ’ failed:’, err.message);
}).then(function() {
return processNext(i + 1);
});
}
return processNext(0);
}

function fetchLeaderboard(statApiKey, statGroup, timePeriodValue, onProgress) {
var period = findPeriod(timePeriodValue);
if (!period) return Promise.reject(new Error(‘Unknown time period’));
if (onProgress) onProgress(0);
return aggregateSeasons(statApiKey, statGroup, period.startYear, onProgress).then(function(rows) {
if (onProgress) onProgress(100);
return rows;
});
}

// ── SNAKE ORDER ───────────────────────────────────────────────────────────────

function buildSnakeOrder(numPlayers, guessesPerRound) {
var order = [];
for (var g = 0; g < guessesPerRound; g++) {
if (g % 2 === 0) { for (var p = 0; p < numPlayers; p++) order.push(p); }
else { for (var p = numPlayers - 1; p >= 0; p–) order.push(p); }
}
return order;
}

// ── SMALL COMPONENTS ──────────────────────────────────────────────────────────

function Spinner(props) {
var size = props.size || 20;
return e(‘div’, { className: ‘spin’, style: { width: size, height: size, border: ‘2px solid rgba(255,255,255,0.2)’, borderTopColor: ‘#f5c842’, borderRadius: ‘50%’, display: ‘inline-block’ } });
}

function RankBadge(props) {
var rank = props.rank;
if (rank >= 1 && rank <= 100) return e(‘span’, { className: ‘badge-hit’ }, ‘#’ + rank);
return e(‘span’, { className: ‘badge-miss’ }, rank > 100 ? ‘#’ + rank : ‘Not Found’);
}

function ProgressBar(props) {
return e(‘div’, { className: ‘progress-track’ },
e(‘div’, { className: ‘progress-fill’, style: { width: props.pct + ‘%’ } })
);
}

// ── AUTOCOMPLETE INPUT ────────────────────────────────────────────────────────

function AutocompleteInput(props) {
var value = props.value, onChange = props.onChange, leaderboard = props.leaderboard;
var onSubmit = props.onSubmit, disabled = props.disabled;
var s1 = useState(false); var open = s1[0]; var setOpen = s1[1];
var s2 = useState(-1); var selIdx = s2[0]; var setSelIdx = s2[1];
var inputRef = useRef(null);

var suggestions = useMemo(function() {
if (!value || value.length < 2 || !leaderboard) return [];
var norm = normalizeName(value);
return leaderboard.filter(function(p) { return normalizeName(p.name).indexOf(norm) !== -1; }).slice(0, 8);
}, [value, leaderboard]);

useEffect(function() { setOpen(suggestions.length > 0); setSelIdx(-1); }, [suggestions.length]);

function choose(name) { onChange(name); setOpen(false); if (inputRef.current) inputRef.current.focus(); }

function handleKey(ev) {
if (!open) { if (ev.key === ‘Enter’ && value.trim()) { ev.preventDefault(); onSubmit(value.trim()); } return; }
if (ev.key === ‘ArrowDown’) { ev.preventDefault(); setSelIdx(function(i) { return Math.min(i + 1, suggestions.length - 1); }); }
else if (ev.key === ‘ArrowUp’) { ev.preventDefault(); setSelIdx(function(i) { return Math.max(i - 1, -1); }); }
else if (ev.key === ‘Enter’) { ev.preventDefault(); if (selIdx >= 0 && suggestions[selIdx]) choose(suggestions[selIdx].name); else if (value.trim()) onSubmit(value.trim()); }
else if (ev.key === ‘Escape’) setOpen(false);
}

return e(‘div’, { style: { position: ‘relative’, flex: 1 } },
e(‘input’, { ref: inputRef, type: ‘text’, value: value,
onChange: function(ev) { onChange(ev.target.value); },
onKeyDown: handleKey,
onBlur: function() { setTimeout(function() { setOpen(false); }, 150); },
onFocus: function() { if (suggestions.length > 0) setOpen(true); },
placeholder: ‘Type a player name…’, disabled: disabled, autoComplete: ‘off’
}),
open && e(‘div’, { className: ‘autocomplete-list slide-down’ },
suggestions.map(function(p, i) {
return e(‘div’, { key: p.name, className: ‘autocomplete-item’ + (i === selIdx ? ’ selected’ : ‘’),
onMouseDown: function() { choose(p.name); }
}, e(‘span’, { style: { marginRight: 8 } }, e(RankBadge, { rank: p.rank })), p.name);
})
)
);
}

// ── HOME SCREEN ───────────────────────────────────────────────────────────────

function HomeScreen(props) {
var s1 = useState(’’); var name = s1[0]; var setName = s1[1];
var s2 = useState(’’); var joinCode = s2[0]; var setJoinCode = s2[1];
var s3 = useState(‘create’); var tab = s3[0]; var setTab = s3[1];

return e(‘div’, { style: { minHeight: ‘100vh’, display: ‘flex’, alignItems: ‘center’, justifyContent: ‘center’, padding: 20 } },
e(‘div’, { style: { maxWidth: 460, width: ‘100%’ } },
e(‘div’, { className: ‘fade-in’, style: { textAlign: ‘center’, marginBottom: 40 } },
e(‘div’, { style: { fontSize: 64, marginBottom: 8 } }, ‘⚾’),
e(‘h1’, { style: { fontSize: 44, fontWeight: ‘bold’, color: ‘#f5c842’, letterSpacing: ‘-0.5px’, lineHeight: 1 } }, ‘The 100 Game’),
e(‘p’, { style: { color: ‘rgba(245,240,224,0.55)’, marginTop: 10, fontSize: 16 } }, “Baseball’s closest-to-100 trivia challenge”)
),
e(‘div’, { className: ‘card fade-in’, style: { animationDelay: ‘0.1s’ } },
e(‘div’, { style: { display: ‘flex’, gap: 8, marginBottom: 24, background: ‘rgba(0,0,0,0.2)’, borderRadius: 10, padding: 4 } },
e(‘button’, { onClick: function() { setTab(‘create’); }, style: { flex: 1, padding: ‘10px’, borderRadius: 8, fontFamily: ‘Georgia,serif’, fontSize: 15, fontWeight: ‘bold’, background: tab === ‘create’ ? ‘rgba(245,200,66,0.2)’ : ‘transparent’, border: tab === ‘create’ ? ‘1px solid rgba(245,200,66,0.5)’ : ‘1px solid transparent’, color: tab === ‘create’ ? ‘#f5c842’ : ‘rgba(245,240,224,0.5)’, cursor: ‘pointer’, transition: ‘all 0.2s’ } }, ‘🏟 Create Room’),
e(‘button’, { onClick: function() { setTab(‘join’); }, style: { flex: 1, padding: ‘10px’, borderRadius: 8, fontFamily: ‘Georgia,serif’, fontSize: 15, fontWeight: ‘bold’, background: tab === ‘join’ ? ‘rgba(245,200,66,0.2)’ : ‘transparent’, border: tab === ‘join’ ? ‘1px solid rgba(245,200,66,0.5)’ : ‘1px solid transparent’, color: tab === ‘join’ ? ‘#f5c842’ : ‘rgba(245,240,224,0.5)’, cursor: ‘pointer’, transition: ‘all 0.2s’ } }, ‘🔗 Join Room’)
),
e(‘div’, { style: { marginBottom: 16 } },
e(‘label’, null, ‘Your Name’),
e(‘input’, { type: ‘text’, value: name, onChange: function(ev) { setName(ev.target.value.slice(0, 20)); }, placeholder: ‘Enter your name…’, maxLength: 20 })
),
tab === ‘join’ && e(‘div’, { style: { marginBottom: 16 } },
e(‘label’, null, ‘Room Code’),
e(‘input’, { type: ‘text’, value: joinCode, onChange: function(ev) { setJoinCode(ev.target.value.toUpperCase().slice(0, 4)); }, placeholder: ‘e.g. AB3D’, maxLength: 4, style: { letterSpacing: 6, fontFamily: ‘monospace’, fontSize: 20, fontWeight: ‘bold’, textAlign: ‘center’ } })
),
e(‘button’, { className: ‘btn-gold’, style: { width: ‘100%’, padding: ‘12px’, fontSize: 17 },
disabled: !name.trim() || (tab === ‘join’ && joinCode.length < 4),
onClick: function() { tab === ‘create’ ? props.onCreateRoom(name.trim()) : props.onJoinRoom(name.trim(), joinCode); }
}, tab === ‘create’ ? ‘🏟 Create Room’ : ‘→ Join Room’)
),
e(‘div’, { className: ‘card fade-in’, style: { animationDelay: ‘0.2s’, marginTop: 20 } },
e(‘h3’, { style: { color: ‘#f5c842’, marginBottom: 12, fontSize: 15 } }, ‘📋 How to Play’),
e(‘p’, { className: ‘small’, style: { color: ‘rgba(245,240,224,0.7)’, lineHeight: 1.7 } },
’The host picks a stat and time period. Players take turns guessing players from that leaderboard. Your score equals your guess's rank (1–100). ‘,
e(‘strong’, { style: { color: ‘#f5c842’ } }, ‘#100 scores 100 pts’),
’ — ranked 101+ scores 0. Closest to #100 wins. Most points after all rounds wins!’
)
)
)
);
}

// ── LOBBY SCREEN ──────────────────────────────────────────────────────────────

function LobbyScreen(props) {
var roomCode = props.roomCode, myName = props.myName, isHost = props.isHost;
var s1 = useState(getRoom(roomCode)); var room = s1[0]; var setRoomState = s1[1];
var s2 = useState(false); var copied = s2[0]; var setCopied = s2[1];
var s3 = useState(false); var starting = s3[0]; var setStarting = s3[1];
var s4 = useState(0); var loadPct = s4[0]; var setLoadPct = s4[1];
var s5 = useState(’’); var loadMsg = s5[0]; var setLoadMsg = s5[1];
var s6 = useState(null); var error = s6[0]; var setError = s6[1];

useEffect(function() {
var iv = setInterval(function() { setRoomState(getRoom(roomCode)); }, 1000);
return function() { clearInterval(iv); };
}, [roomCode]);

function doUpdate(key, val) {
updateRoomSetting(roomCode, key, val);
setRoomState(getRoom(roomCode));
}

function copyCode() {
try { navigator.clipboard.writeText(roomCode); } catch(err) {}
setCopied(true);
setTimeout(function() { setCopied(false); }, 1800);
}

function startGame() {
setError(null); setStarting(true);
var r = getRoom(roomCode);
var s = (r && r.settings) ? r.settings : {};
var statKey = s.statKey || ‘homeRuns’;
var timePeriod = s.timePeriod || ‘last5’;
var stat = findStat(statKey);
if (!stat) { setError(‘Invalid stat.’); setStarting(false); return; }
setLoadMsg(‘Fetching leaderboard…’);
fetchLeaderboard(stat.api, stat.statGroup, timePeriod, function(pct) {
setLoadPct(pct);
setLoadMsg(’Loading seasons… ’ + pct + ‘%’);
}).then(function(lb) {
setLoadMsg(‘Done!’);
props.onStartGame(lb);
}).catch(function(err) {
setError(’Failed to load: ’ + err.message);
setStarting(false);
});
}

if (!room) return e(‘div’, { style: { padding: 40, textAlign: ‘center’ } }, e(Spinner, { size: 32 }));

var settings = room.settings || {};
var players = room.players || [];
var statKey = settings.statKey || ‘homeRuns’;
var timePeriod = settings.timePeriod || ‘last5’;
var rounds = settings.rounds || 3;
var gpr = settings.guessesPerRound || 2;
var statLabel = (findStat(statKey) || {}).label || statKey;
var periodLabel = (findPeriod(timePeriod) || {}).label || timePeriod;

return e(‘div’, { style: { minHeight: ‘100vh’, display: ‘flex’, alignItems: ‘center’, justifyContent: ‘center’, padding: 20 } },
e(‘div’, { style: { maxWidth: 520, width: ‘100%’ } },
e(‘div’, { className: ‘fade-in’, style: { textAlign: ‘center’, marginBottom: 28 } },
e(‘h2’, { style: { fontSize: 26, color: ‘#f5c842’ } }, ‘🏟 Game Lobby’)
),
